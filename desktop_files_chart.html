<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌面文件可视化</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #e0e0e0;
    min-height: 100vh;
    padding: 30px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #00d2ff, #928dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 30px;
  }
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }
  .stat-item {
    text-align: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 28px;
    min-width: 140px;
  }
  .stat-item .num {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(90deg, #00d2ff, #928dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-item .label { font-size: 13px; color: #999; margin-top: 4px; }
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto 30px;
  }
  .chart-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
  }
  .chart-card h2 {
    font-size: 16px;
    margin-bottom: 16px;
    color: #ccc;
  }
  .chart-card.full { grid-column: 1 / -1; }
  .canvas-wrap { position: relative; width: 100%; }
  .canvas-wrap canvas { width: 100% !important; }

  .file-table-wrap {
    max-width: 1200px;
    margin: 0 auto;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    overflow-x: auto;
  }
  .file-table-wrap h2 {
    font-size: 16px;
    margin-bottom: 16px;
    color: #ccc;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 2px solid rgba(255,255,255,0.15);
    color: #aaa;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: #00d2ff; }
  th .arrow { font-size: 10px; margin-left: 4px; }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .ext-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .ext-xlsx  { background: rgba(30,180,80,0.2); color: #4cdf7a; }
  .ext-csv   { background: rgba(30,180,80,0.15); color: #3cc96a; }
  .ext-docx, .ext-doc { background: rgba(40,120,220,0.2); color: #5eb5ff; }
  .ext-md    { background: rgba(150,100,255,0.2); color: #b89cff; }
  .ext-json  { background: rgba(255,200,40,0.2); color: #ffd566; }
  .ext-sql   { background: rgba(255,120,40,0.2); color: #ffa366; }
  .ext-txt   { background: rgba(100,200,210,0.2); color: #7ce0e8; }
  .ext-lnk   { background: rgba(150,150,150,0.15); color: #aaa; }
  .ext-url   { background: rgba(150,150,150,0.15); color: #aaa; }
  .ext-folder { background: rgba(255,220,100,0.2); color: #ffd96e; }
  .size-bar {
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, #00d2ff, #928dff);
    min-width: 2px;
    transition: width 0.3s;
  }
  @media (max-width: 768px) {
    .charts-grid { grid-template-columns: 1fr; }
    body { padding: 16px; }
  }
</style>
</head>
<body>

<h1>桌面文件可视化分析</h1>
<p class="subtitle">C:\Users\SiyXo\Desktop &mdash; 数据快照于 2026-02-28</p>

<div class="stats-bar" id="statsBar"></div>
<div class="charts-grid">
  <div class="chart-card">
    <h2>📊 文件类型分布</h2>
    <div class="canvas-wrap"><canvas id="typeChart"></canvas></div>
  </div>
  <div class="chart-card">
    <h2>💾 各类型占用空间</h2>
    <div class="canvas-wrap"><canvas id="sizeChart"></canvas></div>
  </div>
  <div class="chart-card full">
    <h2>📅 文件时间线（按最后修改时间）</h2>
    <div class="canvas-wrap"><canvas id="timelineChart" height="100"></canvas></div>
  </div>
  <div class="chart-card full">
    <h2>📦 文件大小 Top 10</h2>
    <div class="canvas-wrap"><canvas id="topSizeChart" height="90"></canvas></div>
  </div>
</div>
<div class="file-table-wrap">
  <h2>📋 完整文件列表</h2>
  <table id="fileTable">
    <thead>
      <tr>
        <th data-col="icon">类型</th>
        <th data-col="name">文件名</th>
        <th data-col="ext">扩展名</th>
        <th data-col="size">大小</th>
        <th data-col="sizeBar">大小占比</th>
        <th data-col="date">修改日期</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const files = [
  { name: "Agent_Competition", size: 0, date: "2026-02-28", ext: "folder", isDir: true },
  { name: "cursorweb", size: 0, date: "2026-02-28", ext: "folder", isDir: true },
  { name: "CursorWebAgent", size: 0, date: "2026-02-28", ext: "folder", isDir: true },
  { name: "games", size: 0, date: "2026-01-06", ext: "folder", isDir: true },
  { name: "新建文件夹", size: 0, date: "2026-02-26", ext: "folder", isDir: true },
  { name: "1231.xlsx", size: 54925, date: "2026-02-26", ext: "xlsx" },
  { name: "130.md", size: 6309, date: "2025-12-30", ext: "md" },
  { name: "1_何坤金写打印.docx", size: 19971796, date: "2026-01-05", ext: "docx" },
  { name: "2026新版本硕.xlsx", size: 109628, date: "2026-01-20", ext: "xlsx" },
  { name: "20道bailian.txt", size: 738, date: "2025-10-06", ext: "txt" },
  { name: "50道deepseek.txt", size: 1848, date: "2025-10-06", ext: "txt" },
  { name: "6b322a...8.xlsx", size: 19327, date: "2025-12-01", ext: "xlsx" },
  { name: "Anki.lnk", size: 401, date: "2025-12-23", ext: "lnk" },
  { name: "Antigravity -.lnk", size: 816, date: "2025-11-19", ext: "lnk" },
  { name: "Antigravity.lnk", size: 816, date: "2026-02-27", ext: "lnk" },
  { name: "Clash Verge.lnk", size: 860, date: "2025-09-28", ext: "lnk" },
  { name: "Claude.lnk", size: 2369, date: "2026-02-03", ext: "lnk" },
  { name: "Cursor.lnk", size: 1364, date: "2026-02-28", ext: "lnk" },
  { name: "Cursor_.lnk", size: 1328, date: "2025-09-02", ext: "lnk" },
  { name: "EV录屏.lnk", size: 1736, date: "2025-05-16", ext: "lnk" },
  { name: "Hollow Knight.url", size: 212, date: "2025-09-06", ext: "url" },
  { name: "method_library_doc.md", size: 34302, date: "2026-02-27", ext: "md" },
  { name: "method_library_methods_v3.xlsx", size: 23840, date: "2026-02-27", ext: "xlsx" },
  { name: "MuMu模拟器.lnk", size: 959, date: "2025-12-29", ext: "lnk" },
  { name: "navicat.lnk", size: 1159, date: "2025-10-22", ext: "lnk" },
  { name: "Proxifier.lnk", size: 715, date: "2025-11-24", ext: "lnk" },
  { name: "refer.xlsx", size: 202182, date: "2026-01-28", ext: "xlsx" },
  { name: "rules.csv", size: 11090750, date: "2026-01-13", ext: "csv" },
  { name: "rules.json", size: 1492732, date: "2025-10-28", ext: "json" },
  { name: "rules.xlsx", size: 167545, date: "2026-02-25", ext: "xlsx" },
  { name: "rule_before.csv", size: 46579, date: "2026-01-12", ext: "csv" },
  { name: "test.csv", size: 6253, date: "2025-12-23", ext: "csv" },
  { name: "v2rayN.lnk", size: 1837, date: "2026-01-05", ext: "lnk" },
  { name: "violation_details.sql", size: 10158, date: "2025-11-24", ext: "sql" },
  { name: "Visual Studio Code.lnk", size: 1415, date: "2025-02-19", ext: "lnk" },
  { name: "VRChat.url", size: 212, date: "2026-02-28", ext: "url" },
  { name: "XMind.lnk", size: 675, date: "2025-09-05", ext: "lnk" },
  { name: "Z-Library.lnk", size: 1033, date: "2026-01-26", ext: "lnk" },
  { name: "医保大数据私…_20260226.xlsx", size: 30294577, date: "2026-02-28", ext: "xlsx" },
  { name: "医疗服务项目A违规项目逻辑.xlsx", size: 10132, date: "2025-12-15", ext: "xlsx" },
  { name: "电子工单列表.md", size: 42646, date: "2026-02-04", ext: "md" },
  { name: "重复…收费.xlsx", size: 13008, date: "2025-10-17", ext: "xlsx" },
  { name: "智慧管理平台.lnk", size: 1664, date: "2026-01-19", ext: "lnk" },
  { name: "频次1.xlsx", size: 5723956, date: "2026-01-13", ext: "xlsx" },
  { name: "频次2.xlsx", size: 18266, date: "2026-01-13", ext: "xlsx" },
  { name: "合同.docx", size: 320294, date: "2026-01-21", ext: "docx" },
  { name: "筛选的规则.xlsx", size: 19164, date: "2025-10-16", ext: "xlsx" },
  { name: "新建 DOCX 文档 (2).docx", size: 18026, date: "2025-12-26", ext: "docx" },
  { name: "新建 DOCX 文档.docx", size: 16332, date: "2025-12-02", ext: "docx" },
  { name: "无标…xlsx", size: 6762, date: "2026-02-28", ext: "xlsx" },
  { name: "试验规则1126(2.0版).xlsx", size: 31552, date: "2025-12-13", ext: "xlsx" },
  { name: "试验规则1201(含…).xlsx", size: 30906, date: "2025-12-13", ext: "xlsx" },
  { name: "百度网盘.lnk", size: 705, date: "2025-02-25", ext: "lnk" },
  { name: "频次…前100.xlsx", size: 14203, date: "2025-12-16", ext: "xlsx" },
  { name: "频次…前100_with_json.xlsx", size: 11652, date: "2025-12-15", ext: "xlsx" },
  { name: "频次…查询(1).xlsx", size: 43803, date: "2025-12-18", ext: "xlsx" },
  { name: "频次…查询.xlsx", size: 33785, date: "2025-12-15", ext: "xlsx" },
  { name: "智光管理平台.lnk", size: 718, date: "2026-01-16", ext: "lnk" },
  { name: "星火认知大模型.url", size: 213, date: "2025-09-12", ext: "url" },
  { name: "湖南医保73张表结构.doc", size: 3457536, date: "2026-01-23", ext: "doc" },
  { name: "湖南省…检查-修改-20251020.xlsx", size: 82620, date: "2025-10-20", ext: "xlsx" },
  { name: "湖南省…检查-修改.xlsx", size: 114262, date: "2025-09-30", ext: "xlsx" },
  { name: "湖南省…检查.xlsx", size: 140791, date: "2025-09-30", ext: "xlsx" },
  { name: "项目分析.docx", size: 20845, date: "2025-12-18", ext: "docx" },
  { name: "微信桌面整理.lnk", size: 771, date: "2025-09-14", ext: "lnk" },
];

const extColors = {
  xlsx: "#4cdf7a", csv: "#3cc96a", docx: "#5eb5ff", doc: "#5eb5ff",
  md: "#b89cff", json: "#ffd566", sql: "#ffa366", txt: "#7ce0e8",
  lnk: "#888", url: "#888", folder: "#ffd96e"
};
const extIcons = {
  xlsx: "📊", csv: "📊", docx: "📄", doc: "📄", md: "📝",
  json: "🔧", sql: "🗃️", txt: "📃", lnk: "🔗", url: "🌐", folder: "📁"
};

const totalFiles = files.filter(f => !f.isDir).length;
const totalFolders = files.filter(f => f.isDir).length;
const totalSize = files.reduce((s, f) => s + f.size, 0);
const maxSize = Math.max(...files.map(f => f.size));

function fmtSize(b) {
  if (b === 0) return "—";
  if (b < 1024) return b + " B";
  if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
  return (b / 1048576).toFixed(1) + " MB";
}

document.getElementById("statsBar").innerHTML = `
  <div class="stat-item"><div class="num">${totalFiles}</div><div class="label">文件</div></div>
  <div class="stat-item"><div class="num">${totalFolders}</div><div class="label">文件夹</div></div>
  <div class="stat-item"><div class="num">${fmtSize(totalSize)}</div><div class="label">总大小</div></div>
  <div class="stat-item"><div class="num">${new Set(files.map(f=>f.ext)).size}</div><div class="label">文件类型</div></div>
`;

Chart.defaults.color = "#aaa";
Chart.defaults.borderColor = "rgba(255,255,255,0.06)";

// 1. 文件类型分布（甜甜圈）
const typeCounts = {};
files.forEach(f => { typeCounts[f.ext] = (typeCounts[f.ext] || 0) + 1; });
const typeLabels = Object.keys(typeCounts).sort((a, b) => typeCounts[b] - typeCounts[a]);
const typeData = typeLabels.map(l => typeCounts[l]);
const typeColors = typeLabels.map(l => extColors[l] || "#666");

new Chart(document.getElementById("typeChart"), {
  type: "doughnut",
  data: {
    labels: typeLabels.map(l => `.${l}`),
    datasets: [{ data: typeData, backgroundColor: typeColors, borderWidth: 0, hoverOffset: 8 }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { position: "right", labels: { padding: 14, usePointStyle: true, pointStyle: "circle" } }
    }
  }
});

// 2. 各类型占用空间（柱状图）
const typeSizes = {};
files.forEach(f => { typeSizes[f.ext] = (typeSizes[f.ext] || 0) + f.size; });
const sizeLabels = Object.keys(typeSizes).filter(k => typeSizes[k] > 0).sort((a, b) => typeSizes[b] - typeSizes[a]);
const sizeData = sizeLabels.map(l => +(typeSizes[l] / 1048576).toFixed(2));
const sizeColors = sizeLabels.map(l => extColors[l] || "#666");

new Chart(document.getElementById("sizeChart"), {
  type: "bar",
  data: {
    labels: sizeLabels.map(l => `.${l}`),
    datasets: [{ data: sizeData, backgroundColor: sizeColors, borderRadius: 6, barThickness: 28 }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      y: { title: { display: true, text: "MB" }, grid: { color: "rgba(255,255,255,0.04)" } },
      x: { grid: { display: false } }
    }
  }
});

// 3. 时间线散点图
const timeFiles = files.filter(f => !f.isDir);
const scatterData = timeFiles.map(f => ({
  x: new Date(f.date).getTime(),
  y: f.size / 1024,
  name: f.name,
  ext: f.ext
}));
const scatterColors = timeFiles.map(f => extColors[f.ext] || "#666");

new Chart(document.getElementById("timelineChart"), {
  type: "scatter",
  data: {
    datasets: [{
      data: scatterData,
      backgroundColor: scatterColors,
      pointRadius: scatterData.map(d => Math.max(4, Math.min(16, Math.sqrt(d.y / 10)))),
      pointHoverRadius: 10
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (ctx) => {
            const d = ctx.raw;
            return `${d.name}  (${fmtSize(d.y * 1024)})`;
          }
        }
      }
    },
    scales: {
      x: {
        type: "linear",
        title: { display: true, text: "日期" },
        ticks: {
          callback: v => {
            const d = new Date(v);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
          }
        },
        grid: { color: "rgba(255,255,255,0.04)" }
      },
      y: {
        title: { display: true, text: "文件大小 (KB)" },
        type: "logarithmic",
        grid: { color: "rgba(255,255,255,0.04)" }
      }
    }
  }
});

// 4. Top 10 大小
const top10 = [...files].sort((a, b) => b.size - a.size).slice(0, 10);
new Chart(document.getElementById("topSizeChart"), {
  type: "bar",
  data: {
    labels: top10.map(f => f.name.length > 20 ? f.name.slice(0, 18) + "…" : f.name),
    datasets: [{
      data: top10.map(f => +(f.size / 1048576).toFixed(2)),
      backgroundColor: top10.map(f => extColors[f.ext] || "#666"),
      borderRadius: 6,
      barThickness: 22
    }]
  },
  options: {
    indexAxis: "y",
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => fmtSize(ctx.raw * 1048576) } }
    },
    scales: {
      x: { title: { display: true, text: "MB" }, grid: { color: "rgba(255,255,255,0.04)" } },
      y: { grid: { display: false } }
    }
  }
});

// 5. 文件列表表格
const tbody = document.querySelector("#fileTable tbody");
let sortCol = "size", sortAsc = false;

function renderTable() {
  const sorted = [...files].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === "date") { va = new Date(va); vb = new Date(vb); }
    if (sortCol === "name" || sortCol === "ext") {
      return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    }
    return sortAsc ? va - vb : vb - va;
  });
  tbody.innerHTML = sorted.map(f => `
    <tr>
      <td>${extIcons[f.ext] || "📄"}</td>
      <td title="${f.name}">${f.name}</td>
      <td><span class="ext-badge ext-${f.ext}">${f.isDir ? "文件夹" : "." + f.ext}</span></td>
      <td>${fmtSize(f.size)}</td>
      <td><div class="size-bar" style="width:${maxSize ? Math.max(1, f.size / maxSize * 100) : 0}%"></div></td>
      <td>${f.date}</td>
    </tr>
  `).join("");
}
renderTable();

document.querySelectorAll("#fileTable th").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (col === "sizeBar" || col === "icon") return;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    renderTable();
  });
});
</script>
</body>
</html>
